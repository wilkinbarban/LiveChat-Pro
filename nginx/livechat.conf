# ============================================================
# LiveChat Pro — nginx/livechat.conf
# Proxy inverso con soporte WebSocket y SSL (Let's Encrypt)
#
# Instalación:
#   sudo cp nginx/livechat.conf /etc/nginx/sites-available/livechat
#   sudo ln -s /etc/nginx/sites-available/livechat /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Backend Docker publicado en el host — keepalive para reutilizar conexiones.
# Con docker-compose.yml recomendado, Node escucha en 3000 dentro del contenedor
# y Docker publica HOST_PORT=8080 en 127.0.0.1/0.0.0.0 del host.
# Si ejecutas Node sin Docker, cambia el upstream a 127.0.0.1:3000.
# Permite enviar Connection: upgrade para WebSocket y Connection: ""
# para HTTP normal — necesario para que el keepalive del upstream funcione.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       "";
}

upstream livechat_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + WebSocket
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tu-dominio.com;

    # ── Certificados SSL (Let's Encrypt / Certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;

    # ── Configuración SSL moderna ─────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Cabeceras de seguridad adicionales ────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # ── Tamaños de buffer para WebSocket ─────────────────────
    proxy_buffering off;
    proxy_buffer_size 4k;

    # ── Proxy hacia Node.js ───────────────────────────────────
    location / {
        proxy_pass http://livechat_backend;
        proxy_http_version 1.1;

        # WebSocket: cabeceras de upgrade obligatorias
        # WebSocket: upgrade cuando la request lo solicita; "" para HTTP normal
        # (el bloque map de arriba decide el valor — necesario para keepalive)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Reenviar IP real del cliente
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para WebSocket (conexiones persistentes)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }
}
